name: Generate Worlds Index

on:
  push:
    branches: [main]
    paths:
      - 'worlds/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate index
        run: python .github/scripts/generate_index.py

      - name: Commit and push
        run: |
          git config user.name "Dynastry Bot"
          git config user.email "bot@dynastry.app"
          git add worlds-index.json
          git diff --staged --quiet || git commit -m "chore: update worlds-index.json"
          git push
